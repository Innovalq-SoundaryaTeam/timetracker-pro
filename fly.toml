# fly.toml — TimeTracker Pro
# Generated for Fly.io deployment with persistent SQLite volume

app = "timetracker-pro"        # change this to your chosen app name
primary_region = "sin"         # Singapore — closest to India; change if preferred

[build]

[env]
  PORT     = "8080"
  DATA_DIR = "/data"
  NODE_ENV = "production"

[http_service]
  internal_port       = 8080
  force_https         = true
  auto_stop_machines  = false   # keep alive (no sleep)
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type       = "requests"
    hard_limit = 50
    soft_limit = 25

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[[mounts]]
  source      = "timetracker_data"   # volume name (created via fly volumes create)
  destination = "/data"
  initial_size = "1gb"
